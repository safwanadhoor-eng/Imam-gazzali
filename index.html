function grade(total,max){

let percent=(total/max)*100;

if(percent>=90) return "A+";
if(percent>=80) return "A";
if(percent>=70) return "B+";
if(percent>=60) return "B";
return "C";
}

function searchStudent(){

let name=document.getElementById("searchName").value.trim().toLowerCase();

let student=students.find(
s=>s.name.toLowerCase()===name
);

let result=document.getElementById("result");

if(!student){
result.innerHTML="<h3>Student Not Found</h3>";
return;
}

if(student.absent){
result.innerHTML=`
<div class="result">
<h3>${student.name}</h3>
<p><b>Class:</b> ${student.class}</p>
<p><b>Status:</b> ABSENT</p>
<p><b>Grade:</b> ABSENT</p>
</div>
`;
return;
}

let total=
student.physics+
student.chemistry+
student.biology;

let max=
student.class==="Std 9" ? 60 : 30;

let grd=grade(total,max);

result.innerHTML=`
<div class="result">
<h3>${student.name}</h3>

<table>

<tr><td><b>Physics</b></td><td>${student.physics}</td></tr>

<tr><td><b>Total</b></td><td>${total} / ${max}</td></tr>
<tr><td><b>Grade</b></td><td>${grd}</td></tr>
</table>
</div>
`;
}
