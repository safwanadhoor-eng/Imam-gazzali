function grade(total,max){

let percent=(total/max)*100;

if(percent>=90) return "A+";
if(percent>=80) return "A";
if(percent>=70) return "B+";
if(percent>=60) return "B";
return "C";
}

function searchStudent() {

let name = document.getElementById("searchName")
    .value.trim().toLowerCase();

let student = students.find(
  s => s.name.toLowerCase().includes(name)
);


let result=document.getElementById("result");

if(!student){
result.innerHTML="<h3>Student Not Found</h3>";
return;
}

if(student.absent){
result.innerHTML=`
<div class="result">
<h3>${student.name}</h3>
<p><b>Class:</b> ${student.class}</p>
<p><b>Status:</b> ABSENT</p>
</div>
`;
return;
}

let total=
student.physics+
student.chemistry+
student.biology;

let max=
student.class==="Std 9" ? 60 : 30;

let grd=grade(total,max);

result.innerHTML=`
<div class="result">
<h3>${student.name}</h3>
<table>
<tr><td><b>Class</b></td><td>${student.class}</td></tr>
<tr><td><b>Physics</b></td><td>${student.physics}</td></tr>
<tr><td><b>Chemistry</b></td><td>${student.chemistry}</td></tr>
<tr><td><b>Biology</b></td><td>${student.biology}</td></tr>
<tr><td><b>Total</b></td><td>${total}/${max}</td></tr>
<tr><td><b>Grade</b></td><td>${grd}</td></tr>
</table>
</div>
`;
}

async function downloadPDF() {

const { jsPDF } = window.jspdf;

let name = document.getElementById("searchName").value.trim().toLowerCase();

let student = students.find(

);

const doc = new jsPDF();

doc.setFontSize(14);
doc.text("UNIT TEST - JUNE", 105, 30, {align:"center"});

doc.line(20,35,190,35);

doc.setFontSize(12);
doc.text("Student Name : " + student.name,20,50);
doc.text("Class : " + student.class,20,60);

if(student.absent){

doc.text("STATUS : ABSENT",20,80);
doc.text("GRADE : ABSENT",20,90);

}else{

let total =
student.physics +
student.chemistry +
student.biology;

let max =
student.class==="Std 9" ? 60 : 30;

let grd = grade(total,max);

doc.rect(20,75,170,40);

doc.text("Physics",25,85);
doc.text(String(student.physics),160,85);

doc.text("Chemistry",25,95);
doc.text(String(student.chemistry),160,95);

doc.text("Biology",25,105);
doc.text(String(student.biology),160,105);

doc.text("Total",25,125);
doc.text(total + " / " + max,160,125);

doc.text("Grade",25,135);
doc.text(grd,160,135);
}

doc.save(student.name + "_Marksheet.pdf");
}
